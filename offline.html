<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Smart Mall</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100dvh; background: #f5f5f7; color: #1d1d1f;
            text-align: center; padding: 2rem;
        }
        .container { max-width: 400px; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: .5rem; }
        p { color: #86868b; line-height: 1.5; }
        .retry { margin-top: 1.5rem; }
        .retry a {
            display: inline-block; padding: .75rem 2rem;
            background: #007AFF; color: #fff; border-radius: 12px;
            text-decoration: none; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>Connect to the internet and try again.</p>
        <div class="retry"><a href="/">Try Again</a></div>
    </div>
</body>
</html>
