<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Mall</title>
    <script type="module" src="app.js"></script>
</head>
<body>
    <h1>Smart Mall</h1>
    <p id="status"> Initializing...</p>

    <script>
      function setStatus(msg) {
        console.log(msg);
        const el = document.getElementById('status');
        if(el) el.innerText = msg;
      }

      async function startPush() {
        setStatus('🔍 Checking Capacitor...');
        if (typeof window.Capacitor === 'undefined') {
          setStatus('❌ Capacitor not loaded');
          return;
        }
        setStatus('✅ Capacitor ready');

        if (!window.Capacitor.Plugins || !window.Capacitor.Plugins.PushNotifications) {
          setStatus(' Plugin missing. Run: npx cap sync android');
          return;
        }
        setStatus('✅ PushNotifications found');

        const { PushNotifications } = window.Capacitor.Plugins;

        try {
          setStatus('🔑 Requesting permission...');
          const perm = await PushNotifications.requestPermissions();
          setStatus('Permission: ' + perm.receive);

          if (perm.receive !== 'granted') {
            setStatus('❌ Denied. Enable in Settings > Apps > Smart Mall > Notifications');
            alert('Permission denied. Enable it in phone settings.');
            return;
          }

          setStatus('📡 Registering with FCM...');
          await PushNotifications.register();
          setStatus('✅ Registered');

          PushNotifications.addListener('registration', token => {
            setStatus('🔑 Token received!');
            alert('✅ FCM TOKEN:\n\n' + token.value);
          });

          PushNotifications.addListener('registrationError', err => {
            setStatus('❌ Registration failed');
            alert('❌ Error:\n\n' + JSON.stringify(err, null, 2));
          });

        } catch (e) {
          setStatus('💥 Exception: ' + e.message);
          alert('💥 ' + e.message);
        }
      }

      // Wait for Capacitor bridge to initialize
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(startPush, 800);
      } else {
        document.addEventListener('DOMContentLoaded', () => setTimeout(startPush, 800));
      }
    </script>
</body>
</html>
