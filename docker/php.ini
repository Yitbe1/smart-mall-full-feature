; =============================================================================
; Smart Mall — PHP Configuration (Development)
; =============================================================================

; File uploads
upload_max_filesize = 50M
post_max_size       = 50M

; Execution limits
max_execution_time = 300
max_input_time     = 300

; Error reporting — show all errors in development
display_errors     = On
error_reporting    = E_ALL

; Timezone
date.timezone      = UTC
